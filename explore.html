<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skyBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/output.css">
    <link rel="shortcut icon" href="./assets/icons/plane-departure-solid-full.svg" type="image/x-icon">
</head>

<body>
    <header class="border-b border-gray-200 ">
        <div class="container p-4 mx-auto flex items-center gap-5">
            <h1 class="icons text-2xl flex gap-3">
                <a class="text-[var(--navy-blue)] " href="./index.html">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <a href="./index.html" class="font-bold text-[var(--navy-blue)]">

                    <i class="fa-solid fa-plane-departure "></i> skyBook
                </a>

            </h1>
            <div class="spans flex items-center gap-2">
                <span class="text-gray-300">|</span>
                <span class="text-gray-500">Flights to</span>
                <span class="font-semibold text-[var(--navy-blue)] dest-city">Dubai</span>

            </div>

        </div>
    </header>
    <div class="search">
        <div class="container mx-auto font-bold p-2 ">
            <h2 class="text-2xl">Search Results</h2>
            <span class="text-gray-500 search-res"></span>

        </div>


    </div>

    <main class="font-bold  ">
        <div class="container mx-auto flex gap-3 ">
            <aside class="filter rounded-lg border border-gray-200  flex-1 p-4" aria-label="flights filter">
                <form>
                    <div class="flex  items-center justify-between">
                        <h3 class="flex-1">Filters</h3>
                        <div class="flex-1 flex items-center  justify-end gap-1">
                            <button class="text-[var(--navy-blue)] cursor-pointer" type="reset">Reset |</button>
                            <button type="submit" class=" text-[var(--navy-blue)] cursor-pointer">Filter</button>

                        </div>

                    </div>

                    <div class="airlines flex flex-col gap-2 mt-5 border border-gray-200 p-3">
                        <label for="airline" class="text-gray-500">Airline</label>
                        <select name="airline" id="airline"
                            class=" outline outline-gray-200 focus:outline-gray-200 p-1 appearance-none rounded-lg">

                        </select>
                    </div>
                    <div class="price-range flex flex-col gap-2 mt-5 border border-gray-200 p-3">
                        <label for="range" class="text-gray-500">Price Range</label>
                        <span>170$- 1000$ </span>
                        <input type="range" class="text-blue-700 " id="range" name="range" min="172" max="1000">

                    </div>
                    <div class="price-range flex flex-col gap-2 mt-5 border border-gray-200 p-3">
                        <span for="airline" class="text-gray-500">Stops</span>

                        <div class="flex items-center gap-1">
                            <input type="checkbox" name="stops" value="non-stops" id="stop-0">
                            <label for="stop-0">non-stops</label>
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="checkbox" name="stops" value="one-stops" id="stop-1">
                            <label for="stop-1">one-stops</label>
                        </div>
                        <div class="flex items-center gap-1">
                            <input type="checkbox" name="stops" value="two-stops" id="stop-2">
                            <label for="stop-2">two-stops</label>
                        </div>


                    </div>
                    <div class="dep-time flex flex-col gap-2 mt-5 border border-gray-200 p-3 ">
                        <span class="text-gray-700">Departure Time</span>
                        <div class="flex justify-between">
                            <label>
                                <input type="radio" name="timedep" class="sr-only peer" value="morning">
                                <span
                                    class="p-1 rounded-lg outline outline-gray-200  peer-checked:bg-[var(--navy-blue)] peer-checked:text-white cursor-pointer text-sm">
                                    Morning
                                </span>
                            </label>
                            <label>
                                <input type="radio" name="timedep" class="sr-only peer" value="afternoon">
                                <span
                                    class="p-1 rounded-lg outline outline-gray-200  peer-checked:bg-[var(--navy-blue)] peer-checked:text-white cursor-pointer text-sm">
                                    Afternoon
                                </span>
                            </label>
                        </div>
                        <div class="mt-2">

                            <label>
                                <input type="radio" name="timedep" class="sr-only peer" value="evening">
                                <span
                                    class="p-1 rounded-lg outline outline-gray-200 peer-checked:bg-[var(--navy-blue)] peer-checked:text-white cursor-pointer text-sm">
                                    Evening
                                </span>
                            </label>

                        </div>




                    </div>


                </form>

            </aside>

            <div class="flex-5 flex flex-col gap-2">
                <div class=" flex justify-end">
                    <div class="flex gap-2 items-center">
                        <form>
                            <label for="sort">Sort By :</label>
                            <select name="sort" id="sort"
                                class=" sort appearance-none p-1 border border-gray-200 focus:outline-2 focus:outline-[var(--navy-blue)] focus:text-[var(--navy-blue)] rounded-lg">
                                <option value="Earliest">Earliest</option>
                                <option value="Cheapest">Cheapest</option>
                                <option value="Most Expensive">Most Expensive</option>
                                <option value="original">Original Order</option>
                            </select>
                        </form>
                    </div>

                </div>
                <div class="content  flex flex-col gap-3 scroll h-[70vh] overflow-y-auto w-full">

                </div>

            </div>


        </div>

    </main>


    <script type="module" src="./js/explore.js"></script>


</body>

</html>
