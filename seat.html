<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skyBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/output.css">
    <link rel="shortcut icon" href="./assets/icons/plane-departure-solid-full.svg" type="image/x-icon">
</head>

<body class="bg-[#F7F8FC]">
    <header class="bg-[var(--navy-blue)] fixed w-full z-[1000] top-0">
        <div class="container mx-auto p-5 text-white ">
            <div class="nav"></div>

        </div>
    </header>

    <main class="mt-15  font-bold">

        <div class="container mx-auto flex px-5 pt-5  items-center ">
            <div class=" flex-3 bg-[url(/assets/images/seats.png)] bg-no-repeat  pt-10  bg-center bg-top h-[80vh] ">
                <h1 class="text-3xl mb-2"> Select Your Seat</h1>
                <span class="model text-gray-500"></span>
                <div class="flex  mt-20  gap-5">
                    <div class="seats flex gap-3 flex-3">

                        <div class=" bg-gray-100 rounded-lg h-[87vh] flex-1">

                        </div>


                        <div class="bg-gray-100 rounded-lg h-[87vh] flex-1">

                        </div>

                        <div class=" bg-gray-100 rounded-lg h-[87vh] flex-1 ">

                        </div>



                    </div>
                    <aside class="flex-1 bg-white p-5 h-[70vh] shadow-sm/8  ">
                        <h3 class="text-xl"> Your Selection</h3>
                        <form class="p-1">
                            <div class="flex items-center justify-between  p-5 border border-[var(--dusty)] rounded-lg">
                                <h4>Seat</h4>
                                <div class="info"></div>
                            </div>
                            <div
                                class="mt-3 p-5 rounded-lg flex items-center justify-between border border-[var(--dusty)]">
                                <h4>Ticket Price</h4>
                                <div class="price"></div>
                            </div>
                            <div
                                class="mt-3 p-5 rounded-lg flex gap-2 flex-col justify-between border border-[var(--dusty)]">
                                <h4>Extras</h4>
                                
                               
                            </div>


                        </form>

                    </aside>
                </div>




            </div>



        </div>
    </main>

    <script src="./js/navbar.js"></script>
    <script type="module" src="../js/seat.js"></script>

</body>

</html>
