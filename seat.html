<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skyBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/output.css">
    <link rel="shortcut icon" href="./assets/icons/plane-departure-solid-full.svg" type="image/x-icon">
</head>

<body class="bg-[#F7F8FC]">
    <header class="bg-[var(--navy-blue)] fixed w-full z-[1000] top-0">
        <div class="container mx-auto p-5 text-white ">
            <div class="nav"></div>

        </div>
    </header>

    <main class="mt-15  font-bold">

        <div class="container mx-auto flex px-5 pt-5  items-center ">
            <div class=" flex-2 bg-[url(/assets/images/seats.png)] bg-no-repeat  pt-10  bg-center bg-top h-[80vh] ">
                <h1 class="text-3xl mb-2"> Select Your Seat</h1>
                <span class="model text-gray-500"></span>


                <div class="flex gap-5 mt-20">
                    <div class="flex gap-2 items-center">
                        <span class="w-[20px] h-[20px] bg-[#7BF1A8] rounded-md"></span>
                        <span>Available</span>
                    </div>
                    <div class="flex gap-2 items-center">
                        <span class="w-[20px] h-[20px] bg-[#00BCFF] rounded-md"></span>
                        <span>Selected</span>
                    </div>
                    <div class="flex gap-2 items-center">
                        <span class="w-[20px] h-[20px] bg-[#EAECF3] rounded-md"></span>
                        <span>Occupied</span>
                    </div>
                </div>

                <div class="flex  mt-3 gap-5">
                    <div class="seats flex gap-3 flex-2">

                        <div class=" bg-gray-100 rounded-lg h-[87vh] flex-1">

                        </div>


                        <div class="bg-gray-100 rounded-lg h-[87vh] flex-1">

                        </div>

                        <div class=" bg-gray-100 rounded-lg h-[87vh] flex-1 ">

                        </div>



                    </div>
                    <aside class="border border-[var(--dusty)] flex-1 ">
                        <form class="aside p-2 scroll overflow-y-auto h-[75vh]" >

                        </form>

                    </aside>


                </div>




            </div>



        </div>
    </main>

    <script src="./js/navbar.js"></script>
    <script type="module" src="../js/seat.js"></script>

</body>

</html>
